<!DOCTYPE html>
<html>
<head>
  <title>Catalogue Management</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/css/catalog.css">
</head>

<body>

  <header class="site-header">
    <div class="header-left">
      <h1>Kumara Swami Agencies</h1>
      <span class="header-sub">Smart billing system</span>
    </div>
    <nav class="header-nav">
      <a href="/">Dashboard</a>
      <a href="/billing">+ New Bill</a>
      <a href="/catalog" class="active">Catalog</a>
      <a href="/bills">Bills</a>
      <a href="/logout" style="color:#dc2626;">Logout</a>
    </nav>
  </header>

  <div class="page-wrap">

    <a href="/">← Back to Billing</a>

    <hr />

    <!-- ADD / EDIT FORM -->
    <div class="card form-card">
      <div class="card-header">
        <h2>Add / Edit Item</h2>
      </div>
      <div class="card-body">
        <div class="form-field">
          <label>Item Name</label>
          <input id="catItemName" type="text" placeholder="e.g. Rice 1kg" />
        </div>
        <div class="form-field">
          <label>Price (₹)</label>
          <input id="catItemPrice" type="number" placeholder="0.00" />
        </div>
        <button id="saveCatItemBtn">Save Item</button>
      </div>
    </div>

    <hr />

    <!-- SEARCH + ITEM LIST -->
    <div class="card">
      <div class="card-header">
        <h2>Catalogue Items</h2>
      </div>
      <div class="card-body" style="padding-bottom:0;">
        <div class="search-wrap">
          <input id="catalogSearch" type="search" placeholder="Search items…" />
        </div>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Price</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="catalogItems"></tbody>
        </table>
      </div>
    </div>

    <hr />

    <!-- EXCEL IMPORT -->
    <div class="card import-card">
      <div class="card-header">
        <h2>Import from Excel</h2>
      </div>
      <div class="card-body">
        <div class="import-row">
          <input type="file" id="importFile" accept=".xlsx,.xls,.csv" />
          <button id="importBtn">Import</button>
        </div>
        <p id="importResult"></p>
      </div>
    </div>

  </div><!-- /page-wrap -->

  <script src="/static/catalog.js"></script>
</body>
</html>
