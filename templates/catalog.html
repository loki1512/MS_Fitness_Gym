<!DOCTYPE html>
<html>
<head>
  <title>Catalogue Management</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/css/catalog.css">
</head>

<body>

  <header class="site-header">
  <div class="header-left">
    <h1>Kumara Swami Agencies</h1>
    <span class="header-sub">Smart billing system</span>
  </div>

  <nav class="header-nav">
    <a href="/">Dashboard</a>
    <a href="/billing">+ New Bill</a>
    <a href="/bills">Bills</a>
    
  </nav>
</header>

  <a href="/">← Back to Billing</a>

  <hr />

  <!-- ADD / EDIT FORM -->
  <div>
    <input id="catItemName" placeholder="Item name" />
    <input id="catItemPrice" type="number" placeholder="Price ₹" />
    <button id="saveCatItemBtn">Save Item</button>
  </div>

  <hr />
  <input
  id="catalogSearch"
  placeholder="Search items..."
  style="width:100%; padding:8px; margin:8px 0;"
/>
  <!-- ITEM LIST -->
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Price</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="catalogItems"></tbody>
  </table>

  <hr />

  <!-- EXCEL IMPORT -->
  <h4>Import from Excel</h4>
  <input type="file" id="importFile" />
  <button id="importBtn">Import</button>
  <p id="importResult"></p>

  <script src="/static/catalog.js"></script>
</body>
</html>
