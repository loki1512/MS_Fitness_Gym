<!DOCTYPE html>
<html>
<head>
  <title>Kumara Swami Agencies | Billing</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/css/index.css">
</head>

<body>
  <header class="site-header">
  <div class="header-left">
    <h1>Kumara Swami Agencies</h1>
    <span class="header-sub">Smart billing system</span>
  </div>

  <nav class="header-nav">
    <a href="/">Dashboard</a>
    <a href="/catalog">Catalog</a>
    <a href="/bills">Bills</a>
    <a href="/logout" style="color:#dc2626;">Logout</a>
  </nav>
</header>

  <!-- Customer Details -->
<div class="customer-section">
  <div class="customer-header">
  <label for="toggleCustomer">
    <input type="checkbox" id="toggleCustomer">
    <span>Add Customer Details</span>
  </label>
</div>
  <div id="customerFields" style="display:none; margin-top:8px;">
    <input
      type="text"
      id="customerName"
      placeholder="Customer Name"
    />

    <input
      type="text"
      id="customerPhone"
      placeholder="Phone Number"
    />

    <textarea
      id="customerAddress"
      placeholder="Address"
      rows="2"
    ></textarea>
  </div>
</div>

  <h3>Billing</h3>
  
  <!-- ITEM ENTRY -->
<div class="item-entry">
  <div>
    <input id="itemName" placeholder="Item name" autofocus />
    <div id="suggestions"
     style="border:1px solid #ccc; display:none; position:relative; background:#fff;">
    </div>

    <div class="row">
      <input id="qty" type="number" min="1" value="1" />
      <input id="price" type="number" min="0" placeholder="Price ₹" />
    </div>

    <button id="discountToggleBtn" onclick="toggleDiscount()">
  Add item discount
</button>


    <div id="discountBox" style="display:none;">
      <div class="row">
        <select id="itemDiscountType">
          <option value="%">%</option>
          <option value="₹">₹</option>
        </select>
        <input id="itemDiscountValue" type="number" min="0" placeholder="Discount" />
      </div>
    </div>

    <button id="addItemBtn" onclick="addItem()">+ Add Item</button>

  </div>
</div>
  <hr />

  <!-- ITEM LIST -->
  <div style="overflow-x:auto; -webkit-overflow-scrolling:touch;">
  <table width="100%" border="1" cellspacing="0" cellpadding="6">
  <thead>
    <tr>
      <th>S.No</th>
      <th>Item</th>
      <th>MRP</th>
      <th>Discount</th>
      <th>Final Unit Price</th>
      <th>Amount</th>
      <th></th>
    </tr>
  </thead>
  <tbody id="items"></tbody>
</table>
</div>


  <h3 class="right">Subtotal: ₹ <span id="subtotal">0.00</span></h3>
<button id="finaliseBtn" onclick="openFinalScreen()" class = "primary">
  Finalise Bill
</button>

<!-- FINAL BILL SCREEN -->
<div id="finalScreen" style="display:none; border-top:1px solid #ccc; margin-top:12px; padding-top:12px;">
  <h3>Final Bill</h3>

  <p>Subtotal: ₹ <span id="finalSubtotal">0.00</span></p>

  <div class="row">
    <select id="billDiscountType">
      <option value="%">%</option>
      <option value="₹">₹</option>
    </select>
    <input id="billDiscountValue" type="number" min="0" placeholder="Bill discount" />
  </div>

  <h3>
    Final Amount: ₹ <span id="finalAmount">0.00</span>
  </h3>

  <button onclick="closeFinalScreen()" class="secondary">Back to Edit</button>
  <button id="confirmBillBtn">Confirm & Save Bill</button>
  <button id="viewBillBtn"  onclick="viewBill()">
    View Saved Bill</button>

</div>





  <script type="module" src="/static/app.js"></script>


</body>

</html>
