<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login | Kumara Swami Agencies</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-card {
      background: #fff;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 380px;
      margin: 16px;
    }
    .login-card h1 {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .subtitle {
      text-align: center;
      color: #6b7280;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }
    .login-card label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }
    .login-card input[type="text"],
    .login-card input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 16px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .login-card input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    .login-card button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #2563eb, #1e40af);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .login-card button:hover { opacity: 0.9; }
    .flash-error {
      background: #fef2f2;
      color: #b91c1c;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 0.85rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Kumara Swami Agencies</h1>
    <p class="subtitle">Admin Login</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, msg in messages %}
          <div class="flash-error">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('security.login') }}">
      {{ login_user_form.hidden_tag() }}

      <label for="email">Email</label>
      <input type="text" id="email" name="email" placeholder="Email" required autofocus />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Password" required />

      <button type="submit">Log In</button>
    </form>
  </div>
</body>
</html>
